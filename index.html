<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIRS5 Hub</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Hub hero">
      <div class="logo-wrap">
        <img class="logo" src="./assets/logo.svg" alt="Pirs 5 logo">
      </div>

      <div class="tagline-wrap">
        <p class="section-kicker">Agency Hub</p>
        <h1 class="tagline">Launch the <span>Service Wave</span></h1>
        <p class="subtitle">Direct access to every active PIRS5 product and tool.</p>
      </div>

      <a class="profile-link action" href="https://github.com/pirs5" target="_blank" rel="noopener noreferrer">
        GitHub Profile <span>↗</span>
      </a>
    </section>

    <section class="services-section" aria-labelledby="services-title">
      <div class="section-head">
        <div>
          <p class="section-kicker">Directory</p>
          <h2 id="services-title">Services</h2>
        </div>
        <p id="service-count" class="count"></p>
      </div>
      <div id="services-grid" class="services-grid" aria-live="polite"></div>
    </section>
  </main>

  <template id="card-template">
    <article class="service-card">
      <div class="service-head">
        <h3 class="service-name"></h3>
        <span class="service-kind"></span>
      </div>
      <p class="service-description"></p>
      <a class="service-link action" target="_blank" rel="noopener noreferrer">
        <span class="service-link-text"></span>
        <span>↗</span>
      </a>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
